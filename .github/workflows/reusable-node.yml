name: Reusable Node CI
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show selected Node version
        run: |
          echo "Node version from input is: ${{ inputs.node-version }}"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Show Node version
        run: node --version
      - name: Install dependencies
        run: |
          echo "Installing dependencies"
          npm ci || echo "no package.json, skipping"
      - name: Run tests
        run: |
          echo "Running tests"
          npm test || echo "no tests, skipping"
